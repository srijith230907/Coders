<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODERS | Global Luxury Flagship</title>
    <style>
        :root {
            --earth-green: #3d4a3e;
            --vintage-cream: #e6dec9;
            --dark-text: #1a1a1a;
            --white: #fdfaf5;
            --accent: #b9a38a;
            --transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; cursor: none; }
        body { background: var(--white); color: var(--dark-text); overflow-x: hidden; scroll-behavior: smooth; }

        /* Cursor & Progress */
        #cursor { width: 10px; height: 10px; background: var(--earth-green); border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; mix-blend-mode: multiply; transition: transform 0.15s ease; }
        #progress { position: fixed; top: 0; left: 0; height: 5px; background: var(--earth-green); z-index: 2000; width: 0%; }

        /* Navigation */
        header { position: fixed; top: 0; width: 100%; padding: 25px 50px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(253, 250, 245, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo { font-size: 28px; font-weight: 900; letter-spacing: 15px; color: var(--earth-green); text-transform: uppercase; }
        .cart-trigger { font-weight: 800; letter-spacing: 2px; cursor: pointer; border-bottom: 2px solid var(--earth-green); }

        /* Mosaic Hero */
        .hero { height: 95vh; width: 100%; display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; padding: 120px 20px 20px 20px; }
        .m-item { position: relative; overflow: hidden; border-radius: 4px; }
        .m-item img { width: 100%; height: 120%; object-fit: cover; position: absolute; top: -10%; transition: 1.5s ease; }
        .hero-title { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; color: var(--earth-green); font-size: 8vw; letter-spacing: 30px; font-weight: 200; pointer-events: none; mix-blend-mode: color-burn; }

        /* Filters */
        .filters { padding: 40px 0; display: flex; justify-content: center; gap: 20px; position: sticky; top: 85px; background: var(--white); z-index: 900; border-bottom: 1px solid #eee; }
        .f-btn { padding: 10px 30px; border: 1px solid #ddd; background: none; font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .f-btn.active { background: var(--earth-green); color: white; border-color: var(--earth-green); }

        /* Grid Engine */
        section { padding: 80px 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 50px; }
        .card { opacity: 0; transform: translateY(40px); transition: 1s ease; }
        .card.visible { opacity: 1; transform: translateY(0); }
        .img-box { position: relative; overflow: hidden; height: 500px; border-radius: 2px; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 1.2s; }
        .card:hover .img-box img { transform: scale(1.1); }
        .hover-act { position: absolute; bottom: 0; width: 100%; padding: 25px; background: rgba(0,0,0,0.85); color: white; text-align: center; transform: translateY(100%); transition: 0.4s; font-weight: 800; letter-spacing: 3px; }
        .card:hover .hover-act { transform: translateY(0); }

        .meta { padding: 20px 0; }
        .stock { color: #d00; font-size: 10px; font-weight: 900; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        .price { font-weight: 900; font-size: 1.3rem; color: var(--earth-green); margin-top: 5px; }

        /* Fit Lab */
        .lab { background: var(--earth-green); color: var(--vintage-cream); padding: 120px 50px; display: flex; flex-wrap: wrap; gap: 80px; align-items: center; justify-content: center; }
        .vis { flex: 1; height: 600px; background: white; border-radius: 300px 300px 0 0; position: relative; display: flex; justify-content: center; align-items: flex-end; overflow: hidden; }
        #layer { position: absolute; bottom: 0; width: 65%; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }

        /* Sidebar Cart */
        #cart { position: fixed; top: 0; right: -500px; width: 500px; height: 100vh; background: white; z-index: 2000; padding: 60px; transition: var(--transition); box-shadow: -20px 0 60px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        #cart.active { right: 0; }
    </style>
</head>
<body>

<div id="progress"></div>
<div id="cursor"></div>

<header>
    <div class="logo">CODERS</div>
    <div class="cart-trigger" onclick="toggleCart()">SELECTION (<span id="count">0</span>)</div>
</header>

<div class="hero">
    <div class="m-item"><img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1000" class="parallax"></div>
    <div class="m-item"><img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?q=80&w=1000" class="parallax"></div>
    <div class="m-item"><img src="https://images.unsplash.com/photo-1594932224828-b4b05a8eaee5?q=80&w=1000" class="parallax"></div>
    <div class="hero-title">CODERS</div>
</div>

<div class="filters">
    <button class="f-btn active" onclick="filter('all')">All Volumes</button>
    <button class="f-btn" onclick="filter('casual')">Casual</button>
    <button class="f-btn" onclick="filter('tailoring')">Tailoring</button>
    <button class="f-btn" onclick="filter('kinetic')">Performance</button>
</div>

<section id="shop">
    <div class="grid" id="main-grid"></div>
</section>

<section class="lab">
    <div class="vis">
        <img src="https://www.pngarts.com/files/3/Model-PNG-Transparent-Image.png" style="width: 75%; opacity: 0.2; filter: grayscale(1);">
        <img id="layer" src="https://www.pngarts.com/files/5/White-T-Shirt-PNG-Transparent-Image.png">
    </div>
    <div style="flex: 1; max-width: 500px;">
        <h2 style="font-size: 3rem; margin-bottom: 20px;">FIT-ENGINE AI</h2>
        <p style="margin-bottom: 40px; line-height: 1.8; color: var(--vintage-cream);">Our laboratory uses tension mapping to simulate the 80/20 Cotton-Linen drape on your precise geometry.</p>
        <input type="number" id="h" placeholder="HEIGHT (CM)" oninput="recalc()" style="width:100%; padding:25px; background:transparent; border:1px solid white; color:white; margin-bottom:20px;">
        <input type="number" id="w" placeholder="WEIGHT (KG)" oninput="recalc()" style="width:100%; padding:25px; background:transparent; border:1px solid white; color:white;">
        <div id="size-chip" style="margin-top: 30px; padding: 25px; background: var(--vintage-cream); color: var(--earth-green); text-align: center; font-weight: 900; font-size: 1.5rem; display: none;"></div>
    </div>
</section>

<div id="cart">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>YOUR BAG</h2>
        <span onclick="toggleCart()" style="cursor:pointer; font-weight:900;">CLOSE</span>
    </div>
    <div id="cart-list" style="margin-top: 50px; flex-grow: 1; overflow-y: auto;"></div>
    <div style="border-top: 2px solid black; padding-top: 30px;">
        <div style="display:flex; justify-content:space-between; font-size: 1.8rem; font-weight: 900;">
            <span>TOTAL</span>
            <span id="total-val">₹0</span>
        </div>
        <button style="width:100%; background:var(--earth-green); color:white; border:none; padding:25px; font-weight:900; margin-top:20px; cursor:pointer;" onclick="alert('Proceeding...')">CHECKOUT</button>
    </div>
</div>

<script>
    const data = [
        {id:1, name:"Linen Overshirt", price:6450, cat:"casual", img:"https://images.unsplash.com/photo-1598033129183-c4f50c717658?q=80&w=1000", stock:"ONLY 2 LEFT"},
        {id:2, name:"Mono Blazer", price:14999, cat:"tailoring", img:"https://images.unsplash.com/photo-1591047139829-d91aecb6caea?q=80&w=1000", stock:"BESTSELLER"},
        {id:3, name:"Kinetic Tee", price:3200, cat:"kinetic", img:"https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1000", stock:"NEW SEASON"},
        {id:4, name:"Silk Trousers", price:8900, cat:"casual", img:"https://images.unsplash.com/photo-1539109136881-3be0616acf4b?q=80&w=1000", stock:"FEW UNITS LEFT"},
        {id:5, name:"Tech Trench", price:18500, cat:"tailoring", img:"https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=1000", stock:"LIMITED EDITION"},
        {id:6, name:"Oxygen Jogger", price:4200, cat:"kinetic", img:"https://images.unsplash.com/photo-1532384748853-8f54a8f476e2?q=80&w=1000", stock:"ONLY 4 LEFT"}
    ];

    let bag = JSON.parse(localStorage.getItem('coders_v9')) || [];

    function draw(filter = 'all') {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        const filtered = filter === 'all' ? data : data.filter(d => d.cat === filter);
        filtered.forEach(p => {
            grid.innerHTML += `
                <div class="card visible" onclick="buy(${p.id})">
                    <div class="img-box">
                        <img src="${p.img}">
                        <div class="hover-act">ADD TO BAG +</div>
                    </div>
                    <div class="meta">
                        <span class="stock">${p.stock}</span>
                        <h3>${p.name}</h3>
                        <div class="price">₹${p.price.toLocaleString('en-IN')}</div>
                    </div>
                </div>`;
        });
    }

    function buy(id) {
        const item = data.find(d => d.id === id);
        bag.push(item);
        sync();
        if(!document.getElementById('cart').classList.contains('active')) toggleCart();
    }

    function sync() {
        localStorage.setItem('coders_v9', JSON.stringify(bag));
        const list = document.getElementById('cart-list');
        const count = document.getElementById('count');
        const total = document.getElementById('total-val');
        count.innerText = bag.length;
        let sum = 0;
        list.innerHTML = bag.length ? '' : '<p>Empty Bag</p>';
        bag.forEach((i, idx) => {
            sum += i.price;
            list.innerHTML += `<div style="display:flex; gap:15px; margin-bottom:20px; align-items:center;"><img src="${i.img}" style="width:50px; height:70px; object-fit:cover;"><div style="flex-grow:1"><strong>${i.name}</strong><br>₹${i.price.toLocaleString('en-IN')}</div><span onclick="bag.splice(${idx},1); sync(); event.stopPropagation();" style="color:red; cursor:pointer;">REMOVE</span></div>`;
        });
        total.innerText = `₹${sum.toLocaleString('en-IN')}`;
    }

    function toggleCart() { document.getElementById('cart').classList.toggle('active'); }
    function filter(cat) { document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); draw(cat); }

    window.addEventListener('scroll', () => {
        const h = document.documentElement;
        document.getElementById("progress").style.width = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100 + "%";
        document.querySelectorAll('.parallax').forEach(img => { img.style.transform = `translateY(${window.pageYOffset * 0.15}px)`; });
    });

    document.addEventListener('mousemove', e => {
        const c = document.getElementById('cursor');
        c.style.left = e.clientX + 'px';
        c.style.top = e.clientY + 'px';
    });

    function recalc() {
        const h = document.getElementById('h').value, w = document.getElementById('w').value, l = document.getElementById('layer'), t = document.getElementById('size-chip');
        if(h && w) { l.style.transform = `scale(${(w/h)*2.2}, ${h/175})`; t.style.display = 'block'; t.innerText = (w/((h/100)**2)) < 24 ? "SIZE: MEDIUM (M)" : "SIZE: LARGE (L)"; }
    }

    draw(); sync();
</script>

</body>
</html>
