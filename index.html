<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODERS | Zenith Luxury</title>
    <style>
        :root {
            --earth-green: #3d4a3e;
            --vintage-cream: #e6dec9;
            --dark-text: #111111;
            --white: #fdfaf5;
            --accent: #b9a38a;
            --transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; cursor: none; }
        body { background: var(--white); color: var(--dark-text); overflow-x: hidden; line-height: 1.6; }

        /* Custom Interactive Cursor */
        #cursor { width: 12px; height: 12px; background: var(--earth-green); border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; mix-blend-mode: multiply; transition: transform 0.15s ease, width 0.3s, height 0.3s; }
        #progress { position: fixed; top: 0; left: 0; height: 4px; background: var(--earth-green); z-index: 2000; width: 0%; }

        /* Navigation */
        header { position: fixed; top: 0; width: 100%; padding: 25px 50px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(253, 250, 245, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo { font-size: 28px; font-weight: 900; letter-spacing: 12px; color: var(--earth-green); text-transform: uppercase; transition: 0.3s; }
        .logo:hover { letter-spacing: 15px; }

        /* Immersive Mosaic Hero */
        .hero { height: 100vh; width: 100%; display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; padding: 120px 20px 20px 20px; }
        .m-item { position: relative; overflow: hidden; border-radius: 2px; background: #eee; }
        .m-item img { width: 100%; height: 120%; object-fit: cover; position: absolute; top: -10%; transition: transform 2s ease; }
        .hero:hover .m-item img { transform: scale(1.1) translateY(5%); }
        .hero-title { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; color: var(--earth-green); font-size: 9vw; letter-spacing: 30px; font-weight: 200; pointer-events: none; mix-blend-mode: color-burn; }

        /* Category Filters */
        .filters { padding: 50px 0; display: flex; justify-content: center; gap: 25px; position: sticky; top: 82px; background: var(--white); z-index: 900; }
        .f-btn { padding: 12px 35px; border: 1px solid #ddd; background: none; font-size: 10px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; transition: var(--transition); }
        .f-btn.active { background: var(--earth-green); color: white; border-color: var(--earth-green); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(61, 74, 62, 0.2); }

        /* Products */
        section { padding: 80px 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 60px; }
        .card { opacity: 0; transform: translateY(50px); transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .card.visible { opacity: 1; transform: translateY(0); }
        .img-box { position: relative; overflow: hidden; height: 550px; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 1.5s; }
        .card:hover .img-box img { transform: scale(1.1); }
        
        .quick-look { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(61, 74, 62, 0.1); opacity: 0; transition: 0.4s; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .card:hover .quick-look { opacity: 1; }
        .btn-select { padding: 15px 30px; background: white; color: black; border: none; font-weight: 900; letter-spacing: 2px; }

        .meta { padding: 30px 0; text-align: center; }
        .price { font-weight: 900; font-size: 1.4rem; color: var(--earth-green); margin-top: 10px; }

        /* Fit Lab */
        .lab { background: var(--earth-green); color: var(--vintage-cream); padding: 150px 50px; display: flex; flex-wrap: wrap; gap: 100px; align-items: center; justify-content: center; }
        .vis { flex: 1; height: 650px; background: white; border-radius: 325px 325px 0 0; position: relative; display: flex; justify-content: center; align-items: flex-end; overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.3); }
        #layer { position: absolute; bottom: 0; width: 68%; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }

        /* Cart Sidebar */
        #cart { position: fixed; top: 0; right: -550px; width: 550px; height: 100vh; background: white; z-index: 2000; padding: 60px; transition: var(--transition); box-shadow: -30px 0 80px rgba(0,0,0,0.15); display: flex; flex-direction: column; }
        #cart.active { right: 0; }
        
        /* Persuasion Toast */
        #toast { position: fixed; bottom: 30px; left: 30px; background: var(--earth-green); color: white; padding: 20px 35px; border-radius: 2px; font-weight: 800; font-size: 12px; letter-spacing: 1px; z-index: 5000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="progress"></div>
<div id="cursor"></div>
<div id="toast"></div>

<header>
    <div class="logo">CODERS</div>
    <div onclick="toggleCart()" style="font-weight: 900; letter-spacing: 2px; cursor: pointer; border-bottom: 3px solid var(--earth-green);">SELECTION (<span id="count">0</span>)</div>
</header>

<div class="hero">
    <div class="m-item"><img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1000" class="parallax"></div>
    <div class="m-item"><img src="https://images.unsplash.com/photo-1552374196-1ab2a1c593e8?q=80&w=1000" class="parallax"></div>
    <div class="m-item"><img src="https://images.unsplash.com/photo-1594932224828-b4b05a8eaee5?q=80&w=1000" class="parallax"></div>
    <div class="hero-title">CODERS</div>
</div>

<div class="filters">
    <button class="f-btn active" onclick="filter('all')">View All</button>
    <button class="f-btn" onclick="filter('casual')">Casual</button>
    <button class="f-btn" onclick="filter('formal')">Formal</button>
    <button class="f-btn" onclick="filter('kinetic')">Kinetic</button>
</div>

<section id="shop">
    <div class="grid" id="main-grid"></div>
</section>

<section class="lab">
    <div class="vis">
        <img src="https://www.pngarts.com/files/3/Model-PNG-Transparent-Image.png" style="width: 75%; opacity: 0.2; filter: grayscale(1);">
        <img id="layer" src="https://www.pngarts.com/files/5/White-T-Shirt-PNG-Transparent-Image.png">
    </div>
    <div style="flex: 1; max-width: 500px;">
        <h2 style="font-size: 3.5rem; margin-bottom: 20px; letter-spacing: -2px;">Digital Drape AI</h2>
        <p style="margin-bottom: 40px; line-height: 1.8; color: var(--vintage-cream); font-weight: 300;">We use geometric tension mapping to simulate how our signature 80/20 Cotton-Linen weave adapts to your physical coordinates.</p>
        <input type="number" id="h" placeholder="HEIGHT (CM)" oninput="recalc()" style="width:100%; padding:25px; background:transparent; border:1px solid white; color:white; margin-bottom:20px; font-size: 1.2rem;">
        <input type="number" id="w" placeholder="WEIGHT (KG)" oninput="recalc()" style="width:100%; padding:25px; background:transparent; border:1px solid white; color:white; font-size: 1.2rem;">
        <div id="size-chip" style="margin-top: 30px; padding: 30px; background: var(--vintage-cream); color: var(--earth-green); text-align: center; font-weight: 900; font-size: 1.8rem; display: none;"></div>
    </div>
</section>

<div id="cart">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="letter-spacing: -2px; font-size: 2.5rem;">YOUR BAG</h2>
        <span onclick="toggleCart()" style="cursor:pointer; font-weight:900; opacity: 0.3;">[ CLOSE ]</span>
    </div>
    <div id="cart-list" style="margin-top: 50px; flex-grow: 1; overflow-y: auto;"></div>
    <div style="border-top: 3px solid black; padding-top: 30px;">
        <div style="display:flex; justify-content:space-between; font-size: 2rem; font-weight: 900;">
            <span>TOTAL</span>
            <span id="total-val">₹0</span>
        </div>
        <button style="width:100%; background:var(--dark-text); color:white; border:none; padding:25px; font-weight:900; margin-top:20px; cursor:pointer; letter-spacing: 4px;" onclick="alert('Proceeding to Secure Gateway...')">CHECKOUT</button>
    </div>
</div>

<script>
    const data = [
        {id:1, name:"Linen Field Overshirt", price:6450, cat:"casual", img:"https://images.unsplash.com/photo-1598033129183-c4f50c717658?q=80&w=1000"},
        {id:2, name:"Architecture Blazer", price:14999, cat:"formal", img:"https://images.unsplash.com/photo-1591047139829-d91aecb6caea?q=80&w=1000"},
        {id:3, name:"Kinetic Compression Tee", price:3200, cat:"kinetic", img:"https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1000"},
        {id:4, name:"Linen Theory Trousers", price:4800, cat:"casual", img:"https://images.unsplash.com/photo-1550991152-123c0a2e6bd5?q=80&w=1000"},
        {id:5, name:"Midnight Silk Tuxedo", price:22500, cat:"formal", img:"https://images.unsplash.com/photo-1507679799987-c73779587ccf?q=80&w=1000"},
        {id:6, name:"Oxygen Performance Jogger", price:4200, cat:"kinetic", img:"https://images.unsplash.com/photo-1532384748853-8f54a8f476e2?q=80&w=1000"}
    ];

    let bag = JSON.parse(localStorage.getItem('coders_zenith')) || [];

    function draw(filter = 'all') {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        const filtered = filter === 'all' ? data : data.filter(d => d.cat === filter);
        filtered.forEach(p => {
            grid.innerHTML += `
                <div class="card visible" onclick="buy(${p.id})">
                    <div class="img-box">
                        <img src="${p.img}">
                        <div class="quick-look"><button class="btn-select">ADD TO BAG +</button></div>
                    </div>
                    <div class="meta">
                        <h3 style="letter-spacing: 1px; font-weight: 300;">${p.name}</h3>
                        <div class="price">₹${p.price.toLocaleString('en-IN')}</div>
                    </div>
                </div>`;
        });
    }

    function buy(id) {
        const item = data.find(d => d.id === id);
        bag.push(item);
        sync();
        showToast(`ADDED ${item.name.toUpperCase()} TO BAG`);
    }

    function sync() {
        localStorage.setItem('coders_zenith', JSON.stringify(bag));
        const list = document.getElementById('cart-list');
        const count = document.getElementById('count');
        const total = document.getElementById('total-val');
        count.innerText = bag.length;
        let sum = 0;
        list.innerHTML = bag.length ? '' : '<p style="opacity:0.5">Empty</p>';
        bag.forEach((i, idx) => {
            sum += i.price;
            list.innerHTML += `<div style="display:flex; gap:20px; margin-bottom:25px; align-items:center;"><img src="${i.img}" style="width:60px; height:80px; object-fit:cover;"><div style="flex-grow:1"><strong>${i.name}</strong><br>₹${i.price.toLocaleString('en-IN')}</div><span onclick="bag.splice(${idx},1); sync(); event.stopPropagation();" style="color:red; cursor:pointer; font-weight:bold;">REMOVE</span></div>`;
        });
        total.innerText = `₹${sum.toLocaleString('en-IN')}`;
    }

    function toggleCart() { document.getElementById('cart').classList.toggle('active'); }
    function filter(cat) { 
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active')); 
        event.target.classList.add('active'); 
        draw(cat); 
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    window.addEventListener('scroll', () => {
        const h = document.documentElement;
        document.getElementById("progress").style.width = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100 + "%";
        document.querySelectorAll('.parallax').forEach(img => { img.style.transform = `translateY(${window.pageYOffset * 0.1}px)`; });
        
        const cards = document.querySelectorAll('.card');
        cards.forEach(c => { if(c.getBoundingClientRect().top < window.innerHeight - 100) c.classList.add('visible'); });
    });

    document.addEventListener('mousemove', e => {
        const c = document.getElementById('cursor');
        c.style.left = e.clientX + 'px';
        c.style.top = e.clientY + 'px';
        
        // Sticky Cursor Effect on interactables
        if(e.target.tagName === 'BUTTON' || e.target.tagName === 'A') {
            c.style.transform = 'scale(4)';
            c.style.background = 'rgba(61, 74, 62, 0.1)';
        } else {
            c.style.transform = 'scale(1)';
            c.style.background = 'var(--earth-green)';
        }
    });

    function recalc() {
        const h = document.getElementById('h').value, w = document.getElementById('w').value, l = document.getElementById('layer'), t = document.getElementById('size-chip');
        if(h && w) { l.style.transform = `scale(${(w/h)*2.2}, ${h/175})`; t.style.display = 'block'; t.innerText = (w/((h/100)**2)) < 24 ? "MEDIUM (M)" : "LARGE (L)"; }
    }

    setInterval(() => {
        const fakeSales = ["Someone in Bengaluru just purchased the Monolith Blazer", "Limited Stock: Linen Overshirt", "5 people are viewing the Fit Lab right now"];
        showToast(fakeSales[Math.floor(Math.random() * fakeSales.length)]);
    }, 15000);

    draw(); sync();
</script>

</body>
</html>
